syntax = "proto3";

package cognibrew.inference;

message FaceEmbedding {
  string          face_id    = 1;  // unique identifier for the face
  repeated int32  bbox       = 2;  // bounding box [x1, y1, x2, y2]
  repeated float  embedding  = 3;  // face embedding vector (e.g. 512-dim)
  float           det_score  = 4;  // detection confidence score
}
