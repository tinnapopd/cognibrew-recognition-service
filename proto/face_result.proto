syntax = "proto3";

package cognibrew.recognition;

message FaceRecognized {
  string         face_id          = 1;  // incoming face id
  repeated int32 bbox             = 2;  // bounding box [x1, y1, x2, y2]
  repeated float face_embedding   = 3;  // incoming face embedding vector
  string         match_id         = 4;  // matched person's id
  string         username         = 5;  // matched person's username
  float          score            = 6;  // matched cosine similarity score
  repeated float match_embedding  = 7;  // matched person's face embedding vector
}
